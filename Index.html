<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f7f8fc;
            box-shadow: 0 0 80px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* ── HEADER ── */
        #header {
            background: #1a1f2e;
            color: white;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.01em;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }

        #room-display {
            font-size: 11px;
            font-weight: 500;
            color: #00c896;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        #back-btn {
            background: rgba(255,255,255,0.08);
            color: #e0e4ef;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            display: none;
            transition: background 0.2s;
            font-family: inherit;
        }
        #back-btn:hover { background: rgba(255,255,255,0.15); }

        /* ── MENU VIEW ── */
        #menu-view {
            flex: 1;
            background: #f7f8fc;
            padding: 20px 16px;
            overflow-y: auto;
        }

        #menu-view h3 {
            margin-bottom: 14px;
            color: #8892a4;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding-left: 4px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: white;
            border: 1px solid #eaecf2;
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .contact-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .contact-item strong {
            font-size: 15px;
            color: #1a1f2e;
            font-weight: 600;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            background: #00c896;
            border-radius: 50%;
            margin-right: 14px;
            flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(0,200,150,0.2);
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(0,200,150,0.2); }
            50% { box-shadow: 0 0 0 6px rgba(0,200,150,0.08); }
        }

        /* ── CHAT VIEW ── */
        #chat-view {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #f0f2f8;
        }

        #messages {
            background-image: radial-gradient(circle, #d4d8e8 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .msg-bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            background: white;
            align-self: flex-start;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            color: #1a1f2e;
        }

        .msg-sender {
            font-size: 10px;
            font-weight: 700;
            color: #00c896;
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        #input-container {
            display: flex;
            padding: 12px 12px;
            background: #1a1f2e;
            gap: 10px;
            align-items: center;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 24px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            font-family: inherit;
            transition: background 0.2s;
        }
        #message-input::placeholder { color: rgba(255,255,255,0.35); }
        #message-input:focus { background: rgba(255,255,255,0.15); }

        #send-btn {
            width: 42px;
            height: 42px;
            background: #00c896;
            color: #0d1a15;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }
        #send-btn:hover { opacity: 0.88; transform: scale(1.05); }
        #send-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="header">
            <div>
                <span>🔒 Private Chat App</span>
                <div id="room-display">Main Menu</div>
            </div>
            <button id="back-btn">⬅ Leave Chat</button>
        </div>
        
        <div id="menu-view">
            <h3>Active Users Online</h3>
            <div id="user-list">Loading active users...</div>
        </div>
        
        <div id="chat-view">
            <div id="messages"></div>
            <div id="input-container">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">➔</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, onDisconnect, off } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Realtime Database Config
        const firebaseConfig = {
            databaseURL: "https://androidmessage-d1c86-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Instant Username Input Prompt
        let username = prompt("Enter your username:") || "Anonymous_" + Math.floor(Math.random() * 1000);

        let currentRoomRef = null;
        const globalPresenceRef = ref(database, 'online_users');

        const menuView = document.getElementById('menu-view');
        const chatView = document.getElementById('chat-view');
        const userListContainer = document.getElementById('user-list');
        const roomDisplay = document.getElementById('room-display');
        const backBtn = document.getElementById('back-btn');
        const messagesContainer = document.getElementById('messages');
        const sendBtn = document.getElementById('send-btn');
        const messageInput = document.getElementById('message-input');

        // Broadcast presence online immediately
        const myPresenceRef = push(globalPresenceRef, username);
        onDisconnect(myPresenceRef).remove();

        // Initialize user directory layout
        setupMainMenu();

        function setupMainMenu() {
            onValue(globalPresenceRef, (snapshot) => {
                userListContainer.innerHTML = '';
                let count = 0;

                if (snapshot.exists()) {
                    const users = snapshot.val();
                    Object.values(users).forEach((name) => {
                        if (name !== username) {
                            count++;
                            const div = document.createElement('div');
                            div.classList.add('contact-item');
                            div.innerHTML = `<span class="status-dot"></span><strong>${name}</strong>`;
                            div.addEventListener('click', () => startPrivateChat(name));
                            userListContainer.appendChild(div);
                        }
                    });
                }
                if (count === 0) userListContainer.innerHTML = "<em>Nobody else online.</em>";
            });
        }

        function startPrivateChat(targetUser) {
            const roomID = [username, targetUser].sort().join("_and_");
            menuView.style.display = 'none';
            chatView.style.display = 'flex';
            backBtn.style.display = 'block';
            roomDisplay.textContent = `Chatting with: ${targetUser}`;
            
            messagesContainer.innerHTML = '';
            currentRoomRef = ref(database, 'private_rooms/' + roomID);
            
            onChildAdded(currentRoomRef, (data) => {
                const messageData = data.val();
                const messageElement = document.createElement('div');
                messageElement.classList.add('msg-bubble');
                messageElement.innerHTML = `<span class="msg-sender">${messageData.sender}</span>${messageData.text}`;
                messagesContainer.appendChild(messageElement);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        backBtn.addEventListener('click', () => {
            if (currentRoomRef) { off(currentRoomRef); }
            chatView.style.display = 'none';
            backBtn.style.display = 'none';
            menuView.style.display = 'block';
            roomDisplay.textContent = "Main Menu";
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== '' && currentRoomRef) {
                push(currentRoomRef, {
                    sender: username,
                    text: text,
                    timestamp: Date.now()
                });
                messageInput.value = '';
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
