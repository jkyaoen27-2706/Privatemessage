<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f1117;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #chat-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #f7f8fc;
            position: relative;
            overflow: hidden;
        }

        /* ── HEADER ── */
        #header {
            background: #1a1f2e;
            color: white;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.01em;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
            z-index: 5;
        }

        #room-display {
            font-size: 11px;
            font-weight: 500;
            color: #00c896;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        #back-btn, #logout-btn {
            background: rgba(255,255,255,0.08);
            color: #e0e4ef;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
            font-family: inherit;
        }
        #back-btn:hover, #logout-btn:hover { background: rgba(255,255,255,0.15); }
        #back-btn { display: none; }
        #logout-btn { display: none; }

        /* ── CUSTOM POPUP NOTIFICATION ── */
        #custom-alert {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f8fafc;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        #custom-alert.show { top: 20px; }
        #custom-alert .alert-icon { color: #00c896; font-weight: bold; }

        /* ── AUTH OVERLAY ── */
        #auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(145deg, #1a1f2e 0%, #0d2a22 100%);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 28px;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px 28px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }

        .auth-box h2 {
            margin-bottom: 24px;
            color: #ffffff;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .auth-input {
            width: 100%;
            padding: 13px 16px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 12px;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .auth-input::placeholder { color: rgba(255,255,255,0.35); }
        .auth-input:focus {
            border-color: #00c896;
            box-shadow: 0 0 0 3px rgba(0,200,150,0.18);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #00c896;
            color: #0d1a15;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
            transition: opacity 0.2s, transform 0.1s;
        }
        .auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .auth-toggle {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            margin-top: 18px;
        }
        .auth-toggle span {
            color: #00c896;
            font-weight: 600;
        }

        /* ── MENU VIEW ── */
        #menu-view {
            flex: 1;
            background: #f7f8fc;
            padding: 20px 16px;
            overflow-y: auto;
            display: none;
        }

        #menu-view h3 {
            margin-bottom: 14px;
            color: #8892a4;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding-left: 4px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: white;
            border: 1px solid #eaecf2;
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .contact-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .contact-item strong {
            font-size: 15px;
            color: #1a1f2e;
            font-weight: 600;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            background: #00c896;
            border-radius: 50%;
            margin-right: 14px;
            flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(0,200,150,0.2);
        }

        /* ── CHAT VIEW ── */
        #chat-view {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f0f2f8;
            background-image: radial-gradient(circle, #d4d8e8 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .msg-bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            background: white;
            align-self: flex-start;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            color: #1a1f2e;
            word-break: break-word;
        }

        .msg-bubble.own-msg {
            align-self: flex-end;
            background: #00c896;
            color: #0d1a15;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 4px;
        }

        .msg-sender {
            font-size: 10px;
            font-weight: 700;
            color: #00c896;
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .msg-bubble.own-msg .msg-sender {
            color: #0d1a15;
            opacity: 0.7;
        }

        #input-container {
            display: flex;
            padding: 12px 12px;
            background: #1a1f2e;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        #message-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 24px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            font-family: inherit;
        }
        #message-input::placeholder { color: rgba(255,255,255,0.35); }

        #send-btn {
            width: 42px;
            height: 42px;
            background: #00c896;
            color: #0d1a15;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="custom-alert">
            <span class="alert-icon">⚠️</span>
            <span id="alert-text">Message</span>
        </div>

        <div id="auth-overlay">
            <div class="auth-box" id="login-form">
                <h2>Log In</h2>
                <input type="text" id="login-username" class="auth-input" placeholder="Username" autocomplete="off">
                <input type="password" id="login-password" class="auth-input" placeholder="Password">
                <button class="auth-btn" id="login-submit-btn">Sign In</button>
                <div class="auth-toggle" id="go-to-signup">Don't have an account? <span>Sign Up</span></div>
            </div>

            <div class="auth-box" id="signup-form" style="display: none;">
                <h2>Create Account</h2>
                <input type="text" id="signup-username" class="auth-input" placeholder="Choose Username" autocomplete="off">
                <input type="password" id="signup-password" class="auth-input" placeholder="Create Password">
                <button class="auth-btn" id="signup-submit-btn">Register</button>
                <div class="auth-toggle" id="go-to-login">Already have an account? <span>Log In</span></div>
            </div>
        </div>

        <div id="header">
            <div>
                <span>🔒 Private Chat App</span>
                <div id="room-display">Welcome</div>
            </div>
            <button id="back-btn">⬅ Leave Chat</button>
            <button id="logout-btn">Log Out</button>
        </div>
        
        <div id="menu-view">
            <h3>Active Users Online</h3>
            <div id="user-list">Loading active users...</div>
        </div>
        
        <div id="chat-view">
            <div id="messages"></div>
            <div id="input-container">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">➔</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, push, onChildAdded, onValue, onDisconnect, off, get, child, remove } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://androidmessage-d1c86-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let username = "";
        let currentRoomRef = null;
        let myPresenceRef = null;

        const globalPresenceRef = ref(database, 'online_users');
        const usersDbRef = ref(database, 'registered_users');

        const authOverlay = document.getElementById('auth-overlay');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const menuView = document.getElementById('menu-view');
        const chatView = document.getElementById('chat-view');
        const userListContainer = document.getElementById('user-list');
        const roomDisplay = document.getElementById('room-display');
        const backBtn = document.getElementById('back-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const messagesContainer = document.getElementById('messages');
        const sendBtn = document.getElementById('send-btn');
        const messageInput = document.getElementById('message-input');

        function showNotification(text, isError = true) {
            const alertBox = document.getElementById('custom-alert');
            document.getElementById('alert-text').textContent = text;
            alertBox.querySelector('.alert-icon').textContent = isError ? "⚠️" : "✅";
            alertBox.classList.add('show');
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        }

        document.getElementById('go-to-signup').addEventListener('click', () => {
            loginForm.style.display = 'none'; signupForm.style.display = 'block';
        });
        document.getElementById('go-to-login').addEventListener('click', () => {
            signupForm.style.display = 'none'; loginForm.style.display = 'block';
        });

        // Fixed Registration Node Setup
        document.getElementById('signup-submit-btn').addEventListener('click', () => {
            const userRaw = document.getElementById('signup-username').value.trim();
            const pass = document.getElementById('signup-password').value;

            if(!userRaw || !pass) return showNotification("Please complete all inputs!");
            
            // Filter invalid characters for firebase paths
            const cleanUserKey = userRaw.replace(/[.#$/\[\]]/g, "").toLowerCase();
            if(!cleanUserKey) return showNotification("Invalid username choice!");

            get(child(usersDbRef, cleanUserKey)).then((snapshot) => {
                if (snapshot.exists()) {
                    showNotification("Username is already taken!");
                } else {
                    set(child(usersDbRef, cleanUserKey), {
                        displayName: userRaw,
                        password: pass
                    }).then(() => {
                        showNotification("Account created!", false);
                        logUserIn(userRaw);
                    });
                }
            }).catch((err) => showNotification("Database communication error"));
        });

        // Fixed Login Matching
        document.getElementById('login-submit-btn').addEventListener('click', () => {
            const userRaw = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value;

            if(!userRaw || !pass) return showNotification("Please enter details!");

            const cleanUserKey = userRaw.replace(/[.#$/\[\]]/g, "").toLowerCase();

            get(child(usersDbRef, cleanUserKey)).then((snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if(userData.password === pass) {
                        showNotification("Login successful!", false);
                        logUserIn(userData.displayName);
                    } else {
                        showNotification("Incorrect password!");
                    }
                } else {
                    showNotification("User not found!");
                }
            }).catch((err) => showNotification("Verification system error"));
        });

        function logUserIn(confirmedName) {
            username = confirmedName;
            authOverlay.style.display = 'none';
            menuView.style.display = 'block';
            chatView.style.display = 'none';
            logoutBtn.style.display = 'block';
            backBtn.style.display = 'none';
            roomDisplay.textContent = "Main Menu";

            // Track online presence safely using username as standard key
            const myPresenceKey = username.replace(/[.#$/\[\]]/g, "").toLowerCase();
            myPresenceRef = child(globalPresenceRef, myPresenceKey);
            
            set(myPresenceRef, username);
            onDisconnect(myPresenceRef).remove();

            setupMainMenu();
        }

        logoutBtn.addEventListener('click', () => {
            if (myPresenceRef) {
                remove(myPresenceRef).then(() => {
                    myPresenceRef = null;
                    completeLogoutCleanup();
                }).catch(() => completeLogoutCleanup());
            } else {
                completeLogoutCleanup();
            }
        });

        function completeLogoutCleanup() {
            username = "";
            authOverlay.style.display = 'flex';
            menuView.style.display = 'none';
            chatView.style.display = 'none';
            logoutBtn.style.display = 'none';
            backBtn.style.display = 'none';
            document.getElementById('login-username').value = "";
            document.getElementById('login-password').value = "";
            document.getElementById('signup-username').value = "";
            document.getElementById('signup-password').value = "";
            roomDisplay.textContent = "Welcome";
        }

        function setupMainMenu() {
            onValue(globalPresenceRef, (snapshot) => {
                userListContainer.innerHTML = '';
                let count = 0;

                if (snapshot.exists()) {
                    const users = snapshot.val();
                    Object.values(users).forEach((name) => {
                        if (name !== username) {
                            count++;
                            const div = document.createElement('div');
                            div.classList.add('contact-item');
                            div.innerHTML = `<span class="status-dot"></span><strong>${name}</strong>`;
                            div.addEventListener('click', () => startPrivateChat(name));
                            userListContainer.appendChild(div);
                        }
                    });
                }
                if (count === 0) userListContainer.innerHTML = "<em>Nobody else online right now.</em>";
            });
        }

        function startPrivateChat(targetUser) {
            const roomID = [username, targetUser].sort().join("_and_");
            menuView.style.display = 'none';
            chatView.style.display = 'flex';
            backBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
            roomDisplay.textContent = `Room: ${targetUser}`;
            
            messagesContainer.innerHTML = '';
            currentRoomRef = ref(database, 'private_rooms/' + roomID);
            
            // Strip out older listeners to prevent duplicated bubble entries
            off(currentRoomRef);

            onChildAdded(currentRoomRef, (data) => {
                const messageData = data.val();
                const messageElement = document.createElement('div');
                messageElement.classList.add('msg-bubble');
                
                if (messageData.sender === username) {
                    messageElement.classList.add('own-msg');
                }
                
                messageElement.innerHTML = `<span class="msg-sender">${messageData.sender}</span>${messageData
